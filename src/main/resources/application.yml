spring:
  application:
    name: dostoREAD
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  servlet:
    multipart:
      resolve-lazily: ${SPRING_SERVLET_MULTIPART_RESOLVE_LAZILY:true}
      max-file-size: ${SPRING_SERVLET_MULTIPART_MAX_FILE_SIZE:20MB}
      max-request-size: ${SPRING_SERVLET_MULTIPART_MAX_REQUEST_SIZE:32MB}
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/dostoread}
    username: ${DB_USERNAME:dostoread}
    password: ${DB_PASSWORD:dostoread}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:update}
  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:1025}
    username: ${MAIL_USERNAME:no-reply@localhost}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${MAIL_SMTP_AUTH:false}
          starttls:
            enable: ${MAIL_SMTP_STARTTLS:false}

app:
  minio:
    endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
    access-key: ${MINIO_ACCESS_KEY:minioadmin}
    secret-key: ${MINIO_SECRET_KEY:minioadmin}
  admin:
    enabled: ${ADMIN_BOOTSTRAP_ENABLED:true}
    username: ${ADMIN_USERNAME:admin}
    email: ${ADMIN_EMAIL:admin@localhost}
    password: ${ADMIN_PASSWORD:Admin123!}

server:
  port: ${SERVER_PORT:8080}
