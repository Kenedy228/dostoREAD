<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:insert="~{components/metaHeader :: metaHeader}"></th:block>

    <title>ДостоREAD - панель администратора</title>
</head>

<body>

<div th:replace="~{components/navbar :: navbar}"></div>

<section class="app-container">
    <h1 class="app-title">Панель администратора</h1>

    <div class="space-y-3 pb-8">
        <p class="text-start text-brand-700 text-lg">Администрирование учетных записей</p>
        <a th:href="@{~/admin-panel/accounts/view}" class="block rounded-lg-md border border-slate-200 bg-white px-4 py-3 text-brand-700 hover:bg-brand-50">Учетные записи</a>
    </div>
    <div class="space-y-3 pb-8">
        <p class="text-start text-brand-700 text-lg">Работа с книгами</p>
        <a th:href="@{~/admin-panel/books/view}" class="block rounded-lg-md border border-slate-200 bg-white px-4 py-3 text-brand-700 hover:bg-brand-50">Просмотр и изменение книг</a>
        <a th:href="@{~/admin-panel/books/create}" class="block rounded-lg-md border border-slate-200 bg-white px-4 py-3 text-brand-700 hover:bg-brand-50">Добавить книгу</a>
    </div>
</section>

<div th:replace="~{components/footer :: footer}"></div>
</body>
</html>
