<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:insert="~{components/metaHeader :: metaHeader}"></th:block>

    <title>ДостоREAD - панель пользователя</title>
</head>
<body>

<div th:replace="~{components/navbar :: navbar}"></div>

<h1 class="app-title">Информация о книге</h1>


<div class="md:flex items-center w-full">
    <div class="md:w-1/4 mb-4">
        <img th:src="${book.coverUrl()}" alt="Обложка книги" class="block mx-auto my-auto">
    </div>
    <div>
        <p class="text-justify text-brand-700" th:text="'Название: ' + ${book.title()}"></p>
        <p class="text-justify text-brand-700" th:text="'Автор: ' + ${book.author()}">Автор книги</p>
        <p class="text-justify text-brand-700" th:text="${book.description()}"></p>
        <p class="text-justify text-brand-700">Жанры:</p>
        <div class="flex items-start">
            <p th:each="genre : ${book.genreNames()}" th:text="${genre}"
               class="bg-brand-50 border border-brand-700 mr-2 p-2 text-brand-700 rounded-lg"></p>
        </div>
        <p class="text-justify text-brand-700" th:text="'Ограничение по возрасту: ' + ${book.ageRestrictionCode()}"></p>
        <p class="text-justify text-brand-700" th:text="'Количество страниц: ' + ${book.pageCount()}"></p>
        <p class="text-justify text-brand-700" th:text="'Лицензия: ' + ${book.license()}">Лицензия книги</p>
        <p class="text-justify text-brand-700" th:text="'Дата публикования: ' + ${book.publishDate()}">Дата публикования</p>
        <p class="text-justify text-brand-700" th:text="'Издательство: ' + ${book.publisher()}">Издательство</p>
        <a class="app-button" th:href="@{/read-book(bookID = ${book.id()}, page = ${page}, screen = ${screen})}">Читать</a>
    </div>
</div>

<div th:replace="~{components/footer :: footer}"></div>

</body>
</html>
