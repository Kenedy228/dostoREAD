<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:insert="~{components/metaHeader :: metaHeader}"></th:block>

    <title>ДостоREAD - панель пользователя</title>
</head>
<body>

<div th:replace="~{components/navbar :: navbar}"></div>

<h1 class="app-title">Книги</h1>

<form action="#" method="get" th:action="@{/all-books}" class="mx-auto w-full max-w-3xl">
    <div class="mb-5">
        <div class="inline-flex items-center gap-2 pb-4 mr-4" th:each="genre : ${genresNames}">
            <input type="checkbox" class="app-checkbox" name="pickedGenres" th:id="${'checkbox' + genre}"
                   th:value="${genre}"
                   th:checked="${pickedGenres.contains(genre)}">
            <label class="ml-2 text-brand-700" th:for="${'checkbox' + genre}" th:text="${genre}"></label>
        </div>
    </div>
    <div class="grid gap-4 justify-center my-1">
        <div class="md:w-1/2">
            <div class="search-container">
                <input type="text" class="app-input search-input" id="search-input" name="searchQuery"
                       placeholder="Поиск..." th:value="${searchQuery}">
                <div class="flex items-center mx-auto max-w-md my-3">
                    <button class="app-button mx-1" type="submit">Найти</button>
                    <a th:href="@{/all-books(page=0)}" class="app-button-warning mx-1">Сбросить фильтры</a>
                </div>
            </div>
        </div>
    </div>
</form>

<div class="app-book-grid" id="results">
    <div th:each="card : ${pageData.cards}">
        <div class="app-book-card" style="width: 18rem; height: 430px;">
            <img th:src="${card.coverUrl}" class="app-book-cover" style="width: 150px; height: 250px; margin: 5px auto"
                 alt="изображение книги">
            <div class="mt-2 flex flex-1 flex-col">
                <h5 class="app-card-title" th:text="${card.title}"></h5>
                <p class="text-white/90" th:text="${card.author}"></p>
                <a th:id="${card.id}" class="app-button-light" th:href="@{~/book-info(id=${card.id})}">Подробнее</a>
            </div>
        </div>
    </div>
</div>

<div th:if="${!pageData.hasElements()}">
    <p class="text-center text-brand-700">Книг не найдено</p>
</div>

<nav th:if="${pageData.hasElements()}">
    <ul class="app-pagination">
        <li th:each="i : ${#numbers.sequence(0, pageData.totalPages - 1)}" class="">
            <a th:href="@{/all-books(searchQuery=${searchQuery}, pickedGenres=${pickedGenres}, page=${i})}"
               th:class="${i == pageData.currentPage} ? 'app-page-link-active' : 'app-page-link'"
               th:text="${i + 1}">
            </a>
        </li>
    </ul>
</nav>

<div th:replace="~{components/footer :: footer}"></div>

</body>
</html>
