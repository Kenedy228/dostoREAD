<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
  <th:block th:insert="~{components/metaHeader :: metaHeader}"></th:block>

  <title>ДостоREAD - чтение книги</title>

  <style>
    .page-line {
      margin-bottom: 0.8em;
    }

    .page-content {
      width: 750px;
      line-height: 1.6;
      font-family: Arial, sans-serif;
      height: 700px;
    }

    .text {
      text-align: justify;
      width: 100%;
      hyphens: auto;
      text-indent: 20px;
    }
  </style>
</head>
<body>

<div class="settings w-full bg-brand-700">
  <div class="md:flex justify-between my-4">
    <div class="md:flex justify-between">
      <p class="text-white my-auto pr-1">Шрифт</p>
      <a th:class="'mr-1 inline-flex items-center rounded-md px-3 py-2 font-medium ' + ${font == 'Arial' ? 'bg-emerald-600 text-white' : 'bg-white text-brand-700'}" th:href="@{/read-book(bookID = ${bookID}, page=${currentPage}, font = 'Arial', screen = ${screen.ordinal()})}">Arial</a>
      <a th:class="'mr-1 inline-flex items-center rounded-md px-3 py-2 font-medium ' + ${font == 'Times New Roman' ? 'bg-emerald-600 text-white' : 'bg-white text-brand-700'}" th:href="@{/read-book(bookID = ${bookID}, page=${currentPage}, font = 'Times New Roman', screen = ${screen.ordinal()})}">Times New Roman</a>
    </div>
    <div class="md:flex">
      <p class="text-white my-auto pr-1">Размер текста</p>
      <a th:class="'mr-1 inline-flex items-center rounded-md px-3 py-2 font-medium ' + ${screen.ordinal() == 0 ? 'bg-emerald-600 text-white' : 'bg-white text-brand-700'}" th:href="@{/read-book(bookID = ${bookID}, page=${currentPage}, font = ${font}, screen = '0')}">Стандартный</a>
      <a th:class="'mr-1 inline-flex items-center rounded-md px-3 py-2 font-medium ' + ${screen.ordinal() == 1 ? 'bg-emerald-600 text-white' : 'bg-white text-brand-700'}" th:href="@{/read-book(bookID = ${bookID}, page=${currentPage}, font = ${font}, screen = '1')}">Большой</a>
    </div>
    <div class="md:flex">
      <a class="app-button-light" th:href="@{/read-book/exit(bookID = ${bookID}, page = ${currentPage}, screen = ${screen.ordinal()})}">Выход</a>
    </div>
  </div>
</div>

<div class="page-content mx-auto my-4" th:style="'font-family: ' + ${font} + '; font-size: ' + ${screen.ordinal() == 0 ? '16px;' : '24px'}">
  <div th:each="line : ${bookPage}" class="page-line my-0">
    <p lang="ru" th:text="${line}" class="text my-0"></p>
  </div>
</div>

<div class="app-pagination">
  <a class="app-button" th:if="${currentPage > 0}"
     th:href="@{/read-book(bookID = ${bookID}, page=${currentPage - 1}, font = ${font}, screen = ${screen.ordinal()})}">Предыдущая</a>

  <p class="text-brand-700 my-auto mx-2" th:text="'Страница ' + ${currentPage + 1} + ' из ' + ${totalPages}"></p>

  <a class="app-button" th:if="${currentPage < totalPages - 1}"
     th:href="@{/read-book(bookID = ${bookID}, page=${currentPage + 1}, font = ${font}, screen = ${screen.ordinal()})}">Следующая</a>
</div>

<div th:replace="~{components/footer :: footer}"></div>

</body>
</html>
