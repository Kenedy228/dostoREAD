<!doctype html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<body>
<header th:fragment="navbar" class="bg-brand-700 text-white shadow-sm">
    <nav class="app-container flex flex-col gap-4 py-4 lg:flex-grid gap-4 lg:items-center lg:justify-between">
        <a th:href="@{~/}" class="flex items-center gap-3 text-xl font-semibold">
            <img th:src="@{~/assets/logo.svg}" alt="Логотип" width="56" height="56"/>
            ДостоREAD
        </a>
        <ul class="flex flex-col gap-2 text-center lg:flex-grid gap-4 lg:items-center lg:gap-5 lg:text-left">
            <li><a th:href="@{~/}" class="hover:underline">Главная</a></li>
            <li><a th:href="@{~/login}" sec:authorize="!isAuthenticated()" class="hover:underline">Вход в аккаунт</a></li>
            <li><a th:href="@{~/registration}" sec:authorize="!isAuthenticated()" class="hover:underline">Регистрация аккаунта</a></li>
            <li><a th:href="@{~/admin-panel}" sec:authorize="hasRole('ADMIN')" class="hover:underline">Панель администратора</a></li>
            <li><a th:href="@{~/all-books}" sec:authorize="hasRole('USER')" class="hover:underline">Книги</a></li>
            <li><a th:href="@{~/user-panel}" sec:authorize="hasRole('USER')" class="hover:underline">Панель пользователя</a></li>
            <li><a th:href="@{~/logout}" sec:authorize="isAuthenticated()" class="hover:underline">Выйти</a></li>
        </ul>
    </nav>
</header>
</body>
</html>
