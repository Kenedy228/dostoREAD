<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:insert="~{components/metaHeader :: metaHeader}"></th:block>


    <title>ДостоREAD - вход в аккаунт</title>
</head>
<body>

<div th:replace="~{components/navbar :: navbar}"></div>

<h1 class="app-title">Вход в систему</h1>


<form class="bg-brand-700 mx-auto w-full max-w-3xl rounded-lg" method="post" th:action="@{/login}"
      th:object="${login}">
    <div th:if="${#fields.hasGlobalErrors()}">
        <p th:each="err : ${#fields.globalErrors()}" th:text="${err}" class="text-red-600 pt-4 text-center"></p>
    </div>
    <div class="mb-4 pt-4 mx-4">
        <label for="username" class="app-label-inverse text-white">Имя пользователя</label>
        <input type="text" name="username" id="username" class="app-input" th:field="*{username}"
               th:value="*{username}">
        <div th:if="${#fields.hasErrors('username')}">
            <p th:each="err : ${#fields.errors('username')}" th:text="${err}" class="text-red-600 pt-4"></p>
        </div>
    </div>
    <div class="mb-4 mx-4">
        <label for="password" class="app-label-inverse text-white">Пароль</label>
        <input type="password" name="password" id="password" class="app-input" th:field="*{rawPassword}"
               th:value="*{rawPassword}">
        <div th:if="${#fields.hasErrors('rawPassword')}">
            <p th:each="err : ${#fields.errors('rawPassword')}" th:text="${err}" class="text-red-600 pt-4"></p>
        </div>
    </div>
    <div class="mb-4 mx-4">
        <p><a th:href="@{/password-recovery}" class="text-white">Забыли пароль?</a></p>
    </div>
    <div class="mb-4 mx-4">
        <div class="flex items-start">
            <img th:src="@{/assets/hide.png}" alt="изображение показать пароль" id="show_hide_password"
                 class=" mx-0 hide" style="width: 30px; height: 30px;">
            <p class="text-white ml-3">Показать пароль</p>
        </div>
    </div>
    <div class="pb-4 mx-auto flex max-w-xs justify-center">
        <button class="app-button-light" type="submit">Войти</button>
    </div>
</form>

<p class="text-brand-700 text-center mt-3">Нет аккаунта? <a th:href="@{/registration}"
                                                          class="text-brand-700">Зарегистрировать аккаунт</a></p>

<div th:replace="~{components/footer :: footer}"></div>

<script th:src="@{~/scripts/toggleVisibilityPassword.js}"></script>

</body>
</html>
