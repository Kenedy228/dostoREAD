<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:insert="~{components/metaHeader :: metaHeader}"></th:block>

    <title>ДостоREAD - регистрация аккаунта</title>
</head>
<body>

<div th:replace="~{components/navbar :: navbar}"></div>

<h1 class="app-title">Регистрация аккаунта</h1>

<form class="bg-brand-700 mx-auto w-full max-w-3xl rounded-lg" novalidate method="post" th:action="@{/registration}" th:object="${registration}">
    <div class="mb-4 pt-4 mx-4">
        <label for="username" class="app-label-inverse text-white">Имя пользователя</label>
        <input type="text" name="username" id="username" class="app-input" th:value="*{username}" th:field="*{username}">
        <div th:if="${#fields.hasErrors('username')}">
            <p th:each="err : ${#fields.errors('username')}" th:text="${err}" class="text-red-600 pt-4"></p>
        </div>
    </div>
    <div class="mb-4 mx-4">
        <label for="email" class="app-label-inverse text-white">Электронная почта</label>
        <input type="email" name="email" id="email" class="app-input" th:value="*{email}" th:field="*{email}">
        <div th:if="${#fields.hasErrors('email')}">
            <p th:each="err : ${#fields.errors('email')}" th:text="${err}" class="text-red-600 pt-4"></p>
        </div>
    </div>
    <div class="mb-4 mx-4">
        <label for="password" class="app-label-inverse text-white">Пароль <br>(Пароль должен содержать минимум 1 заглавную латинскую букву, минимум 1 строчную латинскую букву, минимум 1 специальный символ и минимум 1 цифру, длина пароля от 8 до 14 символов)</label>
        <input type="password" name="password" id="password" class="app-input" th:value="*{rawPassword}" th:field="*{rawPassword}">
        <div th:if="${#fields.hasErrors('rawPassword')}">
            <p th:each="err : ${#fields.errors('rawPassword')}" th:text="${err}" class="text-red-600 pt-4"></p>
        </div>
    </div>
    <div class="mb-4 mx-4">
        <label for="passwordConfirmation" class="app-label-inverse text-white">Подтверждение пароля</label>
        <input type="password" name="passwordConfirmation" id="passwordConfirmation" class="app-input" th:value="*{rawPasswordConfirmation}" th:field="*{rawPasswordConfirmation}">
        <div th:if="${#fields.hasErrors('rawPasswordConfirmation')}">
            <p th:each="err : ${#fields.errors('rawPasswordConfirmation')}" th:text="${err}" class="text-red-600 pt-4"></p>
        </div>
    </div>
    <div class="mb-4 mx-4">
        <div class="flex items-start">
            <img th:src="@{/assets/show.png}" alt="изображение показать пароль" id="show_hide_password" class=" mx-0 hide" style="width: 30px; height: 30px;">
            <p class="text-white ml-3">Показать пароль</p>
        </div>
    </div>
    <div class="pb-4 mx-auto flex max-w-xs justify-center">
        <button class="app-button-light" type="submit">Зарегистрироваться</button>
    </div>
</form>

<p class="text-brand-700 text-center mt-3">Уже есть аккаунт? <a th:href="@{/login}" class="text-brand-700">Войти</a></p>

<div th:replace="~{components/footer :: footer}"></div>

<script th:src="@{~/scripts/toggleVisibilityPassword.js}"></script>

</body>
</html>
